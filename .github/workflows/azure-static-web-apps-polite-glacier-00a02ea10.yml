name: Azure Static Web Apps CI/CD

on:
  workflow_dispatch:



jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    environment: AZURE
    permissions:
       id-token: write
       contents: read
       packages: read
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@adolf94'
           
      - name: Install Dependencies
        run: npm install --legacy-peer-deps
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: frontend
          
      - name: Build React
        run: npm run build
        working-directory: frontend

      - name: Substitute JSON 
        uses: restackio/update-json-file-action@2.1
        with:
          file: frontend/dist/config.json
          fields: |
            {
              "api": "${{ vars.API }}",
              "redirectUri": "${{ vars.REDIRECT_URI }}",
              "auth": "${{ vars.AUTH_API }}",
              "authority": "${{ vars.AUTHORITY }}",
              "clientId": "${{ vars.CLIENT_ID }}",
              "audience": "${{ vars.AUDIENCE }}"
            }
          
      - name: Move/Rename config.json to js
        run: |
              echo window.webConfig= > config.js
              cat config.json >> config.js
        working-directory: frontend/dist


      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_POLITE_GLACIER_00A02EA10 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "./frontend/dist" # App source code path
          api_location: "" # Api source code path - optional
          skip_app_build: true
          skip_api_build: true
          output_location: "dist" # Built app content directory - optional
          github_id_token: ${{ steps.idtoken.outputs.result }}
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_POLITE_GLACIER_00A02EA10 }}
          action: "close"
